<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EATGO - Gestión Pedidos</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <a href="admin-dashboard.html" class="admin-brand" style="display:block;text-decoration:none">
      <div class="admin-brand-logo">EATGO</div>
      <div class="admin-brand-sub">Panel Admin</div>
    </a>
    <nav class="admin-nav">
      <div class="admin-nav-section">Principal</div>
      <a href="admin-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="admin-orders.html" class="active"><span class="nav-icon">📦</span> Pedidos</a>
      <a href="admin-products.html"><span class="nav-icon">🍔</span> Productos</a>
      <a href="admin-users.html"><span class="nav-icon">👥</span> Usuarios</a>
      <div class="admin-nav-section" style="margin-top:16px">Tienda</div>
      <a href="menu.html" target="_blank"><span class="nav-icon">🌐</span> Ver Tienda</a>
    </nav>
    <div class="admin-user-info">
      <div class="admin-avatar">👤</div>
      <div>
        <div class="admin-user-name" id="adminName">Admin</div>
        <div class="admin-user-role">Administrador</div>
      </div>
    </div>
    <a href="#" onclick="adminLogout()" class="admin-logout">🚪 Cerrar sesión</a>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="admin-page-title">📦 Gestión de Pedidos</div>
      <div class="admin-topbar-right">
        <span id="pendingBadge" class="topbar-badge">0 pendientes</span>
      </div>
    </header>

    <div class="admin-content">

      <!-- Filter buttons -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button onclick="filterOrders('todos')" class="filter-btn active" style="padding:7px 16px;border-radius:20px;border:2px solid var(--amarillo);background:var(--amarillo);font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer">Todos</button>
        <button onclick="filterOrders('Preparando')" class="filter-btn" style="padding:7px 16px;border-radius:20px;border:2px solid #f5c300;background:#fff3cd;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#856404">🍳 Preparando</button>
        <button onclick="filterOrders('En camino')" class="filter-btn" style="padding:7px 16px;border-radius:20px;border:2px solid #17a2b8;background:#d1ecf1;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#0c5460">🛵 En camino</button>
        <button onclick="filterOrders('Entregado')" class="filter-btn" style="padding:7px 16px;border-radius:20px;border:2px solid #28a745;background:#d4edda;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#155724">✅ Entregado</button>
        <button onclick="filterOrders('Cancelado')" class="filter-btn" style="padding:7px 16px;border-radius:20px;border:2px solid #dc3545;background:#f8d7da;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#721c24">❌ Cancelado</button>
      </div>

      <div class="admin-table-section">
        <div class="table-header">
          <div class="table-title">Lista de Pedidos</div>
          <span id="orderCount" style="font-size:13px;color:#888;font-weight:700"></span>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>N° Pedido</th>
              <th>Cliente</th>
              <th>Fecha / Hora</th>
              <th>Items</th>
              <th>Estado</th>
              <th>Total</th>
              <th>Cambiar Estado</th>
            </tr>
          </thead>
          <tbody id="adminOrdersBody">
            <tr><td colspan="7" style="text-align:center;padding:20px">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- MODAL VER PEDIDO -->
<div id="orderDetailModal" class="modal-overlay">
  <div class="modal" style="max-width:520px">
    <div class="modal-title">📦 Detalle del Pedido</div>
    <div id="orderDetailContent"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-modal-cancel" onclick="closeModal()" style="flex:none;width:120px">Cerrar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="position:fixed;bottom:24px;right:24px;background:var(--rojo);color:white;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);transform:translateY(100px);opacity:0;transition:all .3s"></div>

<script src="js/storage.js"></script>
<script src="js/admin.js"></script>
<script>
  let currentFilter = 'todos';

  document.addEventListener('DOMContentLoaded', () => {
    const user = Storage.requireAdmin();
    if (!user) return;
    document.getElementById('adminName').textContent = user.nombre || 'Admin';
    renderOrdersTable('todos');
    updatePendingBadge();
  });

  function updatePendingBadge() {
    const pending = Storage.getOrders().filter(o => o.estado === 'Preparando').length;
    document.getElementById('pendingBadge').textContent = pending + ' pendiente' + (pending !== 1 ? 's' : '');
  }

  function filterOrders(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.style.fontWeight = '700';
      b.style.opacity = '.7';
    });
    event.target.style.opacity = '1';
    renderOrdersTable(status);
  }

  function renderOrdersTable(filter) {
    const tbody = document.getElementById('adminOrdersBody');
    let orders = [...Storage.getOrders()].reverse();
    if (filter !== 'todos') orders = orders.filter(o => o.estado === filter);

    document.getElementById('orderCount').textContent = orders.length + ' pedido(s)';

    if (orders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#888;font-weight:700">Sin pedidos en esta categoría</td></tr>';
      return;
    }

    const statusBadge = (s) => {
      const map = { 'Preparando':'badge-prep','En camino':'badge-camino','Entregado':'badge-entregado','Cancelado':'badge-cancelado' };
      return `<span class="badge ${map[s]||'badge-prep'}">${s}</span>`;
    };

    tbody.innerHTML = orders.map(o => `
      <tr>
        <td>
          <strong style="color:var(--rojo)">${o.id}</strong>
          <br><span style="font-size:10px;color:#aaa">${o.metodoPago||'N/A'}</span>
        </td>
        <td>${o.userName || 'Cliente'}<br><span style="font-size:11px;color:#888">${o.direccion || ''}</span></td>
        <td>${o.fecha}<br><span style="font-size:11px;color:#888">${o.hora||''}</span></td>
        <td>
          ${(o.items||[]).slice(0,2).map(i => `<div style="font-size:11px">${i.emoji||'🍽️'} ${i.nombre} x${i.qty}</div>`).join('')}
          ${(o.items||[]).length > 2 ? `<div style="font-size:10px;color:#888">+${(o.items||[]).length - 2} más</div>` : ''}
        </td>
        <td>${statusBadge(o.estado)}</td>
        <td><strong style="color:var(--rojo)">${Storage.formatPrice(o.total)}</strong></td>
        <td>
          <select onchange="changeOrderStatusAndRefresh('${o.id}', this.value)" style="padding:5px 8px;border-radius:6px;border:2px solid #eee;font-family:Nunito,sans-serif;font-size:11px;font-weight:700;cursor:pointer;outline:none">
            <option ${o.estado==='Preparando'?'selected':''} value="Preparando">🍳 Preparando</option>
            <option ${o.estado==='En camino'?'selected':''} value="En camino">🛵 En camino</option>
            <option ${o.estado==='Entregado'?'selected':''} value="Entregado">✅ Entregado</option>
            <option ${o.estado==='Cancelado'?'selected':''} value="Cancelado">❌ Cancelado</option>
          </select>
        </td>
      </tr>
    `).join('');
  }

  function changeOrderStatusAndRefresh(orderId, status) {
    Storage.updateOrderStatus(orderId, status);
    showToast('Estado actualizado: ' + status, 'success');
    updatePendingBadge();
    renderOrdersTable(currentFilter);
  }
</script>
</body>
</html>
